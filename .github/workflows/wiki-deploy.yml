name: Deploy Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'wiki/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      
      - name: Clone Wiki Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki-dist
          cd wiki-dist
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
      
      - name: Copy Wiki Files
        run: |
          cp -r wiki/*.md wiki-dist/
          cd wiki-dist
          ls -la
      
      - name: Commit and Push Wiki
        working-directory: wiki-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git diff --cached --quiet || git commit -m "docs: Auto-deploy Wiki from commit ${{ github.sha }}"
          git push origin master || git push origin master --force
      
      - name: Cleanup
        if: always()
        run: |
          rm -rf wiki-dist
